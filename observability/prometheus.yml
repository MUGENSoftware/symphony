global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape Symphony's Prometheus metrics endpoint.
  # Requires SYMPHONY_OBSERVABILITY_PROMETHEUS_PORT to be set on the host.
  # Default assumes port 9568; adjust to match your configuration.
  - job_name: "symphony-elixir"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:9568"]
        labels:
          service: "symphony-elixir"
