server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: symphony
    static_configs:
      - targets:
          - localhost
        labels:
          job: symphony
          service: symphony-elixir
          __path__: /var/log/symphony/symphony.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            issue_identifier: issue_identifier
            session_id: session_id
            trace_id: trace_id
      - labels:
          level:
          issue_identifier:
      - timestamp:
          source: time
          format: RFC3339Nano

  - job_name: linear-pull
    static_configs:
      - targets:
          - localhost
        labels:
          job: linear-pull
          service: symphony-elixir
          __path__: /var/log/symphony/linear-pull.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
      - labels:
          level:
      - timestamp:
          source: time
          format: RFC3339Nano
