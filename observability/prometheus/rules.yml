groups:
  - name: symphony_alerts
    rules:
      - alert: SymphonyRetryStorm
        expr: increase(symphony_issue_retry_total[10m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Symphony retry storm detected"
          description: "Issue retry count increased by {{ $value }} in the last 10 minutes, indicating repeated worker failures."

      - alert: SymphonyProlongedCooldown
        expr: max_over_time(symphony_claude_cooldown_active_value[15m]) == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Claude cooldown active for >15 minutes"
          description: "Claude has been in cooldown state continuously for at least 15 minutes. Check for rate limiting or API issues."

      - alert: SymphonyFailedTurnSpike
        expr: increase(symphony_claude_turns_total{result="failed"}[10m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Spike in failed Claude turns"
          description: "{{ $value }} failed Claude turns in the last 10 minutes, indicating a turn failure burst."
